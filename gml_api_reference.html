<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GML API Reference — GameMaker 7 Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0e0a;--panel:#11150d;--panel2:#0e1109;--ink:#cfd3c0;--dim:#7e856b;
  --toxic:#9ccc3c;--amber:#e0a82e;--blue:#4aa3ff;--line:#262c1c;--mark:#3a4a14;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'Share Tech Mono',monospace;font-size:15px;line-height:1.5}
a{color:var(--toxic)}
.top{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0d110a,#0b0e0a);border-bottom:1px solid var(--line);padding:14px 18px}
.brandrow{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.brand{font-family:'Special Elite',serif;font-size:24px;letter-spacing:1px;color:var(--ink)}
.brand b{color:var(--toxic)}
.subtitle{color:var(--dim);font-size:12.5px}
.langbar{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.lang{font-size:12px;padding:4px 10px;border:1px solid var(--line);background:#0c0f08;color:var(--dim);cursor:pointer;letter-spacing:1px}
.lang.active{border-color:var(--toxic);color:var(--toxic);background:#141a0c}
.searchrow{display:flex;gap:12px;align-items:center;margin-top:12px;flex-wrap:wrap}
#search{flex:1;min-width:220px;background:#0a0d07;border:1px solid var(--line);border-left:3px solid var(--toxic);
  color:var(--ink);padding:11px 13px;font-family:'Share Tech Mono';font-size:14px}
#search:focus{outline:none;border-left-color:var(--amber)}
#count{color:var(--dim);font-size:12.5px;white-space:nowrap}
.note{color:var(--dim);font-size:11.5px;margin-top:8px;opacity:.8}
.wrap{display:flex;align-items:flex-start;max-width:1180px;margin:0 auto}
.nav{position:sticky;top:128px;align-self:flex-start;width:210px;flex:none;padding:18px 8px 40px 18px;max-height:calc(100vh - 128px);overflow:auto}
.nav button{display:flex;justify-content:space-between;gap:8px;width:100%;text-align:left;background:none;border:none;
  color:var(--dim);font-family:'Share Tech Mono';font-size:13px;padding:6px 9px;cursor:pointer;border-left:2px solid transparent}
.nav button:hover{color:var(--ink)}
.nav button.active{color:var(--toxic);border-left-color:var(--toxic);background:#10140b}
.nav .n{color:#555d43}
.main{flex:1;min-width:0;padding:18px 18px 80px}
.sec{margin-bottom:26px}
.sec h2{font-family:'Special Elite',serif;font-size:18px;color:var(--amber);letter-spacing:1px;
  border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:6px}
.secdesc{color:var(--dim);font-size:12.5px;margin:8px 0 12px}
.card{background:var(--panel);border:1px solid var(--line);border-left:3px solid #2c3420;padding:11px 13px;margin:8px 0}
.card:hover{border-left-color:var(--toxic)}
.sig{font-size:15px;word-break:break-word}
.sig .fn{color:var(--toxic);font-weight:bold}
.sig .pa{color:var(--dim)}
.sig mark{background:var(--mark);color:#eaffb0;padding:0 1px}
.tag{display:inline-block;font-size:10.5px;color:#8a9466;border:1px solid var(--line);padding:1px 6px;margin-left:8px;vertical-align:middle;letter-spacing:.5px}
.tag.k{color:var(--amber);border-color:#4a3a16}
.desc{color:var(--ink);font-size:13.5px;margin-top:6px;opacity:.92}
.enbadge{display:inline-block;font-size:9.5px;color:#6f7850;border:1px solid var(--line);padding:0 4px;margin-left:6px;vertical-align:middle}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{background:var(--panel2);border:1px solid var(--line);padding:5px 9px;font-size:13px;color:var(--ink)}
.chip mark{background:var(--mark);color:#eaffb0}
.empty{color:var(--dim);padding:30px 4px}
@media(max-width:760px){.nav{display:none}.wrap{display:block}.brand{font-size:20px}}
</style>
</head>
<body>
<div class="top">
  <div class="brandrow">
    <div class="brand">GML <b>API</b></div>
    <div class="subtitle" id="subtitle"></div>
    <div class="langbar" id="langbar"></div>
  </div>
  <div class="searchrow">
    <input id="search" type="text" autocomplete="off" spellcheck="false">
    <div id="count"></div>
  </div>
  <div class="note" id="note"></div>
</div>
<div class="wrap">
  <nav class="nav" id="nav"></nav>
  <main class="main" id="main"></main>
</div>

 genannten Objekts.", "fr": "Détruit toutes les instances de l'objet nommé.", "es": "Destruye todas las instancias del objeto indicado.", "id": "Menghancurkan semua instansi objek yang disebut."}, {"name": "instance_change", "params": "name", "cat": "instance", "kind": "function", "en": "Turn the current instance into another object.", "tr": "Geçerli örneği başka bir nesneye dönüştürür.", "de": "Verwandelt die aktuelle Instanz in ein anderes Objekt.", "fr": "Transforme l'instance actuelle en un autre objet.", "es": "Convierte la instancia actual en otro objeto.", "id": "Mengubah instansi saat ini menjadi objek lain."}, {"name": "instance_exists", "params": "name", "cat": "instance", "kind": "function", "en": "Return whether any instance of the object exists.", "tr": "Nesnenin herhangi bir örneği var mı döndürür.", "de": "Gibt zurück, ob eine Instanz des Objekts existiert.", "fr": "Indique si une instance de l'objet existe.", "es": "Indica si existe alguna instancia del objeto.", "id": "Mengembalikan apakah ada instansi objek tersebut."}, {"name": "instance_count", "params": "name", "cat": "instance", "kind": "function", "en": "Count living instances (of an object, or all).", "tr": "Yaşayan örnekleri sayar (bir nesnenin ya da tümünün).", "de": "Zählt lebende Instanzen (eines Objekts oder aller).", "fr": "Compte les instances vivantes (d'un objet ou toutes).", "es": "Cuenta las instancias vivas (de un objeto o todas).", "id": "Menghitung instansi hidup (suatu objek atau semua)."}, {"name": "instance_nearest", "params": "name", "cat": "instance", "kind": "function", "en": "Return the nearest instance of the named object.", "tr": "Adı verilen nesnenin en yakın örneğini döndürür.", "de": "Gibt die nächste Instanz des genannten Objekts zurück.", "fr": "Renvoie l'instance la plus proche de l'objet nommé.", "es": "Devuelve la instancia más cercana del objeto indicado.", "id": "Mengembalikan instansi terdekat dari objek yang disebut."}, {"name": "place_meeting", "params": "c t gegebenem Tempo.", "fr": "Définit la vitesse vers (x, y) à la vitesse donnée.", "es": "Mueve hacia (x, y) a la velocidad dada.", "id": "Mengatur kecepatan menuju (x, y) dengan laju tertentu."}, {"name": "move_contact_solid", "params": "dir,maxdist", "cat": "movement", "kind": "function", "en": "Move in a direction until touching a solid (stub).", "tr": "Bir yönde katı bir nesneye değene dek hareket (taslak).", "de": "Bewegt in eine Richtung bis zur Berührung eines Festkörpers (Stub).", "fr": "Se déplace dans une direction jusqu'à toucher un solide (ébauche).", "es": "Se mueve en una dirección hasta tocar un sólido (esbozo).", "id": "Bergerak ke suatu arah hingga menyentuh benda padat (rintisan)."}, {"name": "motion_set", "params": "dir,spd", "cat": "movement", "kind": "function", "en": "Set motion from a direction (degrees) and speed.", "tr": "Hareketi yön (derece) ve hızdan ayarlar.", "de": "Setzt die Bewegung aus Richtung (Grad) und Tempo.", "fr": "Définit le mouvement à partir d'une direction (degrés) et d'une vitesse.", "es": "Establece el movimiento con dirección (grados) y velocidad.", "id": "Mengatur gerakan dari arah (derajat) dan laju."}, {"name": "motion_add", "params": "dir,spd", "cat": "movement", "kind": "function", "en": "Add to the current motion: direction and speed.", "tr": "Mevcut harekete ekler: yön ve hız.", "de": "Addiert zur aktuellen Bewegung: Richtung und Tempo.", "fr": "Ajoute au mouvement actuel : direction et vitesse.", "es": "Añade al movimiento actual: dirección y velocidad.", "id": "Menambah gerakan saat ini: arah dan laju."}, {"name": "point_direction", "params": "x1,y1,x2,y2", "cat": "math", "kind": "function", "en": "Angle in degrees from (x1,y1) to (x2,y2).", "tr": "(x1,y1)'den (x2,y2)'ye derece cinsinden açı.", "de": "Winkel in Grad von (x1,y1) nach (x2,y2).", "fr": "Angle en degrés de (x1,y1) vers (x2,y2).", "es": "Ángulo en grados de (x1,y1) a (x2,y2).", "id": "Sudut dalam derajat dari (x1,y1) ke (x2,y2)."}, {"name": "point_distance", "params": "x1,y1,x2,y2", "cat": "math", "kind": "function", "en": "Distance between two points.", "tr": "İki nokta arası uzaklık.", "de": "Abstand zwischen zwei Punkten.", "fr": "Distance entre deux points.", "es": "Distancia entre dos puntos.", "id": "Jarak antara dua titik."}, {"name": "lengthdir_x", "params": "len,dir", "cat": "math", "kind": "function", "en": "X component of a vector with a length and direction.", "tr": "Uzunluk ve yöne sahip vektörün X bileşeni.", "de": "X-Komponente eines Vektors aus Länge und Richtung.", "fr": "Composante X d'un vecteur défini par longueur et direction.", "es": "Componente X de un vector con longitud y dirección.", "id": "Komponen X dari vektor dengan panjang dan arah."}, {"name": "lengthdir_y", "params": "len,dir", "cat": "math", "kind": "function", "en": "Y component of a vector with a length and direction.", "tr": "Uzunluk ve yöne sahip vektörün Y bileşeni.", "de": "Y-Komponente eines Vektors aus Länge und Richtung.", "fr": "Composante Y d'un vecteur défini par longueur et direction.", "es": "Componente Y de un vector con longitud y dirección.", "id": "Komponen Y dari vektor dengan panjang dan arah."}, {"name": "abs", "params": "", "cat": "math", "kind": "function", "en": "Absolute value.", "tr": "Mutlak değer.", "de": "Absolutwert.", "fr": "Valeur absolue.", "es": "Valor absoluto.", "id": "Nilai mutlak."}, {"name": "sqrt", "params": "", "cat": "math", "kind": "function", "en": "Square root.", "tr": "Karekök.", "de": "Quadratwurzel.", "fr": "Racine carrée.", "es": "Raíz cuadrada.", "id": "Akar kuadrat."}, {"name": "sin", "params": "d", "cat": "math", "kind": "function", "en": "Sine of an angle in degrees.", "tr": "Derece cinsinden açının sinüsü.", "de": "Sinus eines Winkels in Grad.", "fr": "Sinus d'un angle en degrés.", "es": "Seno de un ángulo en grados.", "id": "Sinus sudut dalam derajat."}, {"name": "cos", "params": "d", "cat": "math", "kind": "function", "en": "Cosine of an angle in degrees.", "tr": "Derece ci andom real from 0 up to n.", "tr": "0 ile n arası rastgele gerçek sayı.", "de": "Zufällige reelle Zahl von 0 bis n.", "fr": "Réel aléatoire de 0 à n.", "es": "Real aleatorio de 0 a n.", "id": "Bilangan real acak dari 0 hingga n."}, {"name": "irandom", "params": "n", "cat": "math", "kind": "function", "en": "Random integer from 0 up to n.", "tr": "0 ile n arası rastgele tam sayı.", "de": "Zufällige Ganzzahl von 0 bis n.", "fr": "Entier aléatoire de 0 à n.", "es": "Entero aleatorio de 0 a n.", "id": "Bilangan bulat acak dari 0 hingga n."}, {"name": "random_range", "params": "a,b", "cat": "math", "kind": "function", "en": "Random real between two values.", "tr": "İki değer arası rastgele gerçek sayı.", "de": "Zufällige reelle Zahl zwischen zwei Werten.", "fr": "Réel aléatoire entre deux valeurs.", "es": "Real aleatorio entre dos valores.", "id": "Bilangan real acak antara dua nilai."}, {"name": "irandom_range", "params": "a,b", "cat": "math", "kind": "function", "en": "Random integer between two values.", "tr": "İki değer arası rastgele tam sayı.", "de": "Zufällige Ganzzahl zwischen zwei Werten.", "fr": "Entier aléatoire entre deux valeurs.", "es": "Entero aleatorio entre dos valores.", "id": "Bilangan bulat acak antara dua nilai."}, {"name": "choose", "params": "...args", "cat": "math", "kind": "function", "en": "Return one of the arguments at random.", "tr": "Argümanlardan birini rastgele döndürür.", "de": "Gibt zufällig eines der Argumente zurück.", "fr": "Renvoie au hasard l'un des arguments.", "es": "Devuelve al azar uno de los argumentos.", "id": "Mengembalikan salah satu argumen secara acak."}, {"name": "string", "params": "v", "cat": "string", "kind": "function", "en": "Convert a value to a string.", "tr": "Bir değeri metne çevirir.", "de": "Wandelt einen Wert in einen Text um.", "fr": "Convertit une valeur en chaîne.", "es": "Convierte un valor en cadena.", "id": "Mengubah nilai menjadi teks."}, {"name": "string_length", "params": "s", "cat": "string", "kind": const li = ()=>DATA.langs.indexOf(lang);
const norm = s => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
const esc = s => s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
function hl(text){ if(!q) return esc(text); const n=norm(text), nq=norm(q); const i=n.indexOf(nq);
  if(i<0) return esc(text); return esc(text.slice(0,i))+"<mark>"+esc(text.slice(i,i+q.length))+"</mark>"+esc(text.slice(i+q.length)); }
function searchText(it){ return norm(it.name+" "+it.params+" "+(it.en||"")+" "+(it.tr||"")+" "+(it.de||"")+" "+(it.fr||"")+" "+(it.es||"")+" "+(it.id||"")); }
function matches(it){ return (cat==="all"||it.cat===cat) && (!q || searchText(it).includes(norm(q))); }
function descOf(it){ if(it.kind==="constant") return null;
  const t=it[lang]; if(t) return {t:t,en:false};
  return {t:it.en,en:lang!=="en"}; }

function buildLangs(){ const bar=document.getElementById("langbar"); bar.innerHTML="";
  DATA.langs.forEach((code,idx)=>{ const b=document.createElement("button"); b.className="lang"+(code===lang?" active":"");
    b.textContent=DATA.langnames[idx]; b.onclick=()=>{lang=code;render();}; bar.appendChild(b); }); }

function render(){
  const L=li();
  document.documentElement.lang=lang;
  document.getElementById("subtitle").innerHTML=DATA.ui.subtitle[L];
  document.getElementById("search").placeholder=DATA.ui.search[L];
  document.getElementById("note").textContent=DATA.ui.descnote[L];
  buildLangs();
  // nav
  const nav=document.getElementById("nav"); nav.innerHTML="";
  const mkNav=(id,label,n)=>{ const b=document.createElement("button"); b.className=(cat===id?"active":"");
    b.innerHTML="<span>"+label+"</span><span class='n'>"+n+"</span>"; b.onclick=()=>{cat=id;render();window.scrollTo(0,0);}; nav.appendChild(b); };
  mkNav("all",DATA.ui.all[L],DATA.items.length);
  DATA.catorder.forEach(c=>{ const n=DATA.items.filter(it=>it.cat===c).length; if(n) mkNav(c,DATA.cat[c][L],n); });

  // main
  const main=document.getElementById("main"); main.innerHTML="";
  let shown=0;
  DATA.catorder.forEach(c=>{
    const list=DATA.items.filter(it=>it.cat===c && matches(it));
    if(!list.length) return;
    const sec=document.createElement("div"); sec.className="sec";
    sec.innerHTML="<h2>"+DATA.cat[c][L]+" <span class='n' style='color:#555d43;font-size:13px'>("+list.length+")</span></h2>";
    if(DATA.groupdesc[c]) { const d=document.createElement("div"); d.className="secdesc"; d.textContent=DATA.groupdesc[c][L]; sec.appendChild(d); }
    if(c==="color"||c==="keys"||c==="primitives"){
      const chips=document.createElement("div"); chips.className="chips";
      list.forEach(it=>{ const ch=document.createElement("div"); ch.className="chip"; ch.innerHTML=hl(it.name); chips.appendChild(ch); shown++; });
      sec.appendChild(chips);
    } else {
      list.forEach(it=>{ shown++;
        const card=document.createElement("div"); card.className="card";
        const params=it.params? "<span class='pa'>("+esc(it.params)+")</span>" : "<span class='pa'>()</span>";
        const d=descOf(it);
        let html="<div class='sig'><span class='fn'>"+hl(it.name)+"</span>"+params+"<span class='tag'>"+DATA.cat[c][L]+"</span></div>";
        if(d){ html+="<div class='desc'>"+esc(d.t||"")+(d.en?"<span class='enbadge'>EN</span>":"")+"</div>"; }
        card.innerHTML=html; sec.appendChild(card);
      });
    }
    main.appendChild(sec);
  });
  if(!shown){ const e=document.createElement("div"); e.className="empty"; e.textContent=DATA.ui.none[L]; main.appendChild(e); }

  // count label
  const cnt=document.getElementById("count");
  if(q) cnt.textContent=shown+" "+DATA.ui.results[L];
  else cnt.textContent=DATA.items.length+" "+DATA.ui.count_funcs[L];
}
document.getElementById("search").addEventListener("input",e=>{ q=e.target.value.trim(); render(); });
render();
</script>
</body>
</html>
